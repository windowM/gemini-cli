<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주변 맛집 추천 - 오피스 헬퍼</title>
  <link href='/style.css' rel='stylesheet'>
  <!-- 카카오맵 API (키가 필요합니다. 발급 전까지는 지도가 보이지 않을 수 있습니다) -->
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_MAPS_APP_KEY&libraries=services"></script>
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="logo-link"><h1 class="logo">💼 오피스 헬퍼</h1></a>
      <button id="theme-toggle">🌙 다크 모드</button>
    </header>

    <main>
      <a href="/" class="back-link">&larr; 메인으로 돌아가기</a>
      
      <section class="page-card">
        <h2>📍 내 주변 실시간 맛집 추천</h2>
        <p>내 위치 기준 10km 이내의 실제 식당 정보를 가져옵니다.</p>
        
        <div class="recommend-box">
          <select id="category-select" class="form-input">
            <option value="한식">👥 든든한 한식 (팀 점심)</option>
            <option value="분식">🏃 간단한 분식 (혼밥/신속)</option>
            <option value="일식">🍱 정갈한 일식</option>
            <option value="중식">🥢 빠른 중식</option>
            <option value="양식">🍝 분위기 양식</option>
            <option value="카페">☕ 카페 & 디저트</option>
          </select>
          
          <button id="recommend-btn" class="main-btn">내 주변 식당 검색 및 추천!</button>
          
          <div id="loading-spinner" style="display:none; margin: 15px 0;">위치 정보를 파악하고 식당을 찾는 중...</div>
          
          <!-- 추천 결과 영역 -->
          <div id="result-container" style="display:none; margin-top: 25px; text-align: left;">
            <div id="recommendation-display" style="font-size: 1.4rem; color: var(--accent-color); border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
              <!-- 식당 이름 -->
            </div>
            
            <div id="place-info" style="margin: 15px 0; font-size: 0.95rem;">
              <p>📌 <strong>주소:</strong> <span id="place-address"></span></p>
              <p>📞 <strong>전화:</strong> <span id="place-phone"></span></p>
              <p>🍴 <strong>분류:</strong> <span id="place-category"></span></p>
            </div>

            <!-- 미니맵 영역 -->
            <div id="mini-map" style="width:100%; height:250px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color);"></div>
            
            <div id="map-link-container">
              <!-- 카카오맵 상세페이지 링크 -->
            </div>
          </div>
        </div>
      </section>

      <!-- API 키 등록 가이드 (임시) -->
      <section class="page-card" id="api-guide" style="font-size: 0.85rem; opacity: 0.7;">
        <h3>⚠️ 지도가 보이지 않나요?</h3>
        <p>카카오맵 API를 사용하려면 개인 API 키가 필요합니다. <code>lunch.html</code> 파일의 9번 라인 <code>YOUR_KAKAO_MAPS_APP_KEY</code> 부분을 본인의 JavaScript 키로 변경해주세요.</p>
      </section>
    </main>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
