<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunch & Partnership</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <header>
      <button id="theme-toggle">Switch to Dark Mode</button>
    </header>

    <main>
      <!-- Lunch Recommendation Section -->
      <section class="card">
        <h1>🍴 Today's Lunch?</h1>
        <div id="recommendation-display">
          <p>Need a suggestion?</p>
        </div>
        <button id="recommend-btn">Recommend Me!</button>
      </section>

      <!-- Partnership Form Section -->
      <section class="card">
        <h2>🤝 Partnership Inquiry</h2>
        <form action="https://formspree.io/f/mlgpzrkn" method="POST" class="partnership-form">
          <div class="form-group">
            <label for="name">Name / Company</label>
            <input type="text" name="name" id="name" required placeholder="Your name">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required placeholder="email@example.com">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea name="message" id="message" required placeholder="How can we collaborate?"></textarea>
          </div>
          <button type="submit" class="submit-btn">Send Proposal</button>
        </form>
      </section>
    </main>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
