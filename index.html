<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunch & Partnership</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <header>
      <button id="theme-toggle">Switch to Dark Mode</button>
    </header>

    <main>
      <!-- Lunch Recommendation Section -->
      <section class="card">
        <h1>🍴 Today's Lunch?</h1>
        <div id="recommendation-display">
          <p>Need a suggestion?</p>
        </div>
        <button id="recommend-btn">Recommend Me!</button>
      </section>

      <!-- Partnership Form Section -->
      <section class="card">
        <h2>🤝 Partnership Inquiry</h2>
        <form action="https://formspree.io/f/mlgpzrkn" method="POST" class="partnership-form">
          <div class="form-group">
            <label for="name">Name / Company</label>
            <input type="text" name="name" id="name" required placeholder="Your name">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required placeholder="email@example.com">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea name="message" id="message" required placeholder="How can we collaborate?"></textarea>
          </div>
          <button type="submit" class="submit-btn">Send Proposal</button>
        </form>
      </section>

      <!-- Disqus Comment Section -->
      <section class="card">
        <h2>💬 Chat & Feedback</h2>
        <div id="disqus_thread"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

            var disqus_config = function () {
            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            */
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://project1-hrzhxp7kcy.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
      </section>
      </main>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
