  <link href='/style.css' rel='stylesheet'>

<body>
  <div class="container">
    <header>
      <a href="/" class="logo-link"><h1 class="logo">💼 오피스 헬퍼</h1></a>
      <button id="theme-toggle">🌙 다크 모드</button>
    </header>

    <main>
      <a href="/" class="back-link">← 메인으로 돌아가기</a>
      
      <section class="page-card">
        <div class="icon" style="font-size: 3rem; text-align: center; margin-bottom: 20px;">⏰</div>
        <h2 style="text-align: center;">스케줄 & 알람 설정</h2>
        <p style="text-align: center; margin-bottom: 30px;">중요한 업무 일정을 등록하고 알람을 받으세요.</p>

        <form id="schedule-form" class="asset-form">
          <div class="form-group">
            <label for="schedule-title">일정 내용</label>
            <input type="text" id="schedule-title" class="form-input" placeholder="예: 주간 회의, 보고서 마감" required>
          </div>
          <div class="form-group">
            <label for="schedule-time">알람 시간</label>
            <input type="datetime-local" id="schedule-time" class="form-input" required>
          </div>
          <button type="submit" class="main-btn">일정 추가하기</button>
        </form>
      </section>

      <section class="page-card">
        <h3>📋 등록된 일정</h3>
        <div id="schedule-list-container">
          <!-- 일정이 여기에 렌더링됩니다 -->
        </div>
      </section>
    </main>

    <footer class="main-footer">
      <div class="footer-links">
        <a href="/privacy.html">개인정보처리방침</a>
        <a href="/terms.html">이용약관</a>
      </div>
      <p>&copy; 2026 오피스 헬퍼. All rights reserved.</p>
    </footer>

  <script defer type="text/javascript" src="/main.js"></script>
